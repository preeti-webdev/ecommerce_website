{% extends 'store/base.html' %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-md-5">

        {% if product.image %}
            <img src="{{ product.image.url }}"
                 class="img-fluid rounded shadow"
                 alt="{{ product.name }}">
        {% else %}
            <img src="https://via.placeholder.com/500x400"
                 class="img-fluid rounded shadow"
                 alt="No Image">
        {% endif %}

    </div>

    <div class="col-md-7">

        <h2>{{ product.name }}</h2>

        <hr>

        <h3 class="text-success">
            ₹{{ product.price }}
        </h3>

        <p class="mt-3">
            {{ product.description }}
        </p>

        <div class="mt-4">

            <a href="{% url 'add_to_cart' product.id %}"
               class="btn btn-success btn-lg me-2">
                <i class="bi bi-cart-plus"></i>
                Add To Cart
            </a>

            <a href="{% url 'add_to_wishlist' product.id %}"
               class="btn btn-outline-danger btn-lg">
                ❤️ Add To Wishlist
            </a>

        </div>

        <div class="mt-4">

            <a href="/"
               class="btn btn-secondary">
                ← Back To Products
            </a>

        </div>

    </div>

</div>

{% endblock %}
