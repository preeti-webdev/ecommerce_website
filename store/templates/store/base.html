<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce Store{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body{
            background-color:#f8f9fa;
        }
        .navbar{
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(10px);
        }
        .navbar-brand{
            font-weight:bold;
        }

        .product-card{
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-5px);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        footer{
            margin-top:80px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="bi bi-shop"></i>
            E-Commerce Store
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <form class="d-flex mx-3" method="GET" action="/">
            <input
                class="form-control me-2"
                type="search"
                name="q"
                placeholder="Search products..."
                value="{{ request.GET.q }}"
            >
        
            <button class="btn btn-warning" type="submit">
                Search
            </button>
        </form>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="bi bi-house"></i>
                        Home
                    </a>
                </li>

                {% if user.is_authenticated %}

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'wishlist' %}">
                        ❤️ Wishlist
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'cart' %}">
                        <i class="bi bi-cart3"></i>
                        Cart
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'my_orders' %}">
                        <i class="bi bi-bag-check"></i>
                        Orders
                    </a>
                </li>

                <li class="nav-item">
                    <span class="nav-link">
                        <i class="bi bi-person-circle"></i>
                        {{ user.username }}
                    </span>
                </li>

                <li class="nav-item">
                    <a class="btn btn-danger ms-2"
                       href="{% url 'logout' %}">
                        Logout
                    </a>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="btn btn-success me-2"
                       href="{% url 'login' %}">
                        Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-primary"
                       href="{% url 'register' %}">
                        Register
                    </a>
                </li>

                {% endif %}

            </ul>

        </div>

    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-dark text-white text-center py-3">
    <div class="container">
        <p class="mb-0">
            © 2026 E-Commerce Store | Built with Django & Bootstrap
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
